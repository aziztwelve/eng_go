syntax = "proto3";

package video.v1;

option go_package = "github.com/elearning/shared/pkg/proto/video/v1;videov1";

import "google/protobuf/timestamp.proto";

// VideoService управляет видео контентом
service VideoService {
  // GetVideoURL получает signed URL для просмотра видео
  rpc GetVideoURL(GetVideoURLRequest) returns (GetVideoURLResponse);
  
  // UploadVideo загружает видео (streaming)
  rpc UploadVideo(stream UploadVideoRequest) returns (UploadVideoResponse);
  
  // GetVideoMetadata получает метаданные видео
  rpc GetVideoMetadata(GetVideoMetadataRequest) returns (GetVideoMetadataResponse);
  
  // ListVideos получает список всех видео (для админов)
  rpc ListVideos(ListVideosRequest) returns (ListVideosResponse);
  
  // DeleteVideo удаляет видео
  rpc DeleteVideo(DeleteVideoRequest) returns (DeleteVideoResponse);
}

// GetVideoURL - получение signed URL
message GetVideoURLRequest {
  string video_id = 1;
  string user_id = 2;
}

message GetVideoURLResponse {
  string signed_url = 1;
  int32 expires_in_seconds = 2;
}

// UploadVideo - загрузка видео
message UploadVideoRequest {
  oneof data {
    VideoMetadata metadata = 1;
    bytes chunk = 2;
  }
}

message VideoMetadata {
  string title = 1;
  string description = 2;
  string content_type = 3;
  int64 size_bytes = 4;
  int32 duration_seconds = 5;
  string resolution = 6;
  string uploaded_by = 7;
}

message UploadVideoResponse {
  string video_id = 1;
  string message = 2;
}

// GetVideoMetadata - получение метаданных
message GetVideoMetadataRequest {
  string video_id = 1;
}

message GetVideoMetadataResponse {
  Video video = 1;
}

// ListVideos - список видео
message ListVideosRequest {
  int32 page = 1;
  int32 page_size = 2;
  string status = 3; // active, processing, deleted
  string search = 4; // Search by title or description
}

message ListVideosResponse {
  repeated Video videos = 1;
  int32 total = 2;
}

// DeleteVideo - удаление видео
message DeleteVideoRequest {
  string video_id = 1;
}

message DeleteVideoResponse {
  bool success = 1;
  string message = 2;
}

// Video - полная информация о видео
message Video {
  string id = 1;
  string title = 2;
  string description = 3;
  string storage_key = 4;
  string bucket_name = 5;
  string content_type = 6;
  int64 size_bytes = 7;
  int32 duration_seconds = 8;
  string resolution = 9;
  string thumbnail_url = 10;
  string status = 11;
  string uploaded_by = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}
